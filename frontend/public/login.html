<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - QR Medical System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <img src="/logo1.png" alt="CarBuddy Logo" class="topbar-logo">
    <div class="prototype-label">PROTOTYPE</div>
    <div class="topbar-right"></div>
  </div>

  <div class="container mt-2">
    <div class="card">
      <h2 class="text-center mb-1">Login to Portal</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" pattern="[0-9]{10}" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Login</button>
      </form>
      <div class="text-center mt-1">
        <a href="/signup.html" style="color: var(--primary-color);">Don't have an account? Signup</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
